{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}گنجور{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Vazir Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'core/css/custom.css' %}">
    {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'core:home' %}">گنجور</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'core:favorites' %}">علاقه‌مندی‌ها</a></li>
            </ul>
            <form class="d-flex" action="{% url 'core:search' %}" method="get">
                <input class="form-control me-2" type="search" placeholder="جستجو" aria-label="Search" name="q">
                <button class="btn btn-outline-success" type="submit">جستجو</button>
            </form>
            <span class="navbar-text">
                {% if user.is_authenticated %}
                    درود, {{ user.username }}!
                    <form action="{% url 'core:logout' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm ms-2">خروج</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="/admin/login/">ورود</a>
                {% endif %}
            </span>
        </div>
    </div>
</nav>
<div class="container">
    <main>
        {% block content %}{% endblock %}
    </main>
</div>
<footer class="bg-dark text-white text-center p-3 mt-4">
    <p>&copy; 2025 گنجور</p>
</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
